<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Chladni Shader Brush</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    canvas {
      display: block;
    }

    /* keep UI on top */
    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
    }
  </style>
</head>

<body>

  <script>

    // ================== VERTEX SHADER ==================
    const vert = `
#ifdef GL_ES
precision highp float;
#endif

attribute vec3 aPosition;
attribute vec2 aTexCoord;

varying vec2 vTexCoord;

void main() {
  vTexCoord = aTexCoord;

  vec4 positionVec4 = vec4(aPosition, 1.0);
  positionVec4.xy = positionVec4.xy * 2.0 - 1.0;

  gl_Position = positionVec4;
}
`;

    // ================== FRAGMENT SHADER ==================
    const frag = `
#ifdef GL_ES
precision highp float;
#endif

uniform vec2 iResolution;
uniform float iTime;
uniform vec2 iMouse;

uniform vec3 uColorA;
uniform vec3 uColorB;
uniform vec3 uColorC;
uniform vec3 uColorD;

varying vec2 vTexCoord;

#define PI 3.14159265359

float a = 1.5;
float b = 2.0;
float m = 1.0;
float n = 2.0;
float p1 = 1.0;
float p2 = 1.0;
float p3 = -1.0;
float p4 = -1.0;

float Chladni(float a, float b, float m, float n, vec4 p, vec2 z, float t) {
  float v1 = a * sin(PI * n * z.x - p.x * t ) * sin(PI * m * z.y + p.y * t);
  float v2 = b * sin(PI * m * z.x - p.z * t) * sin(PI * n * z.y + p.w * t);
  return v1 + v2;
} 

float pattern1(vec2 z, float t){
  return 10.0 * sin(z.x * z.x / 2.0 + z.y * z.y / 2.0 - t);
}

float map(float value, float min1, float max1, float min2, float max2) {
  return min2 + (value - min1) * (max2 - min2) / (max1 - min1);
}

vec3 palette(float t) {
  return uColorA
       + uColorB * cos(2.0 * PI * (uColorC * t + uColorD));
}

void main() {

  vec2 uv = vTexCoord * 2.0 - 1.0;
  uv.x *= iResolution.x / iResolution.y;

  // === MOUSE DISTORTION ===
  vec2 mouse = iMouse;

  float dist = distance(uv, mouse);
  float force = exp(-dist * 6.0);

  vec2 dir = normalize(uv - mouse);
  uv += dir * force * 0.25;

  // === FLOW MOTION ===
  uv += 0.03 * vec2(
    sin(iTime + uv.y * 4.0),
    cos(iTime + uv.x * 4.0)
  );

  vec4 po = vec4(p1, p2, p3, p4);

  float col1 = Chladni(a, b, m, n, po, uv, iTime * 0.15);
  float col2 = pattern1(uv, iTime * 0.06);

  float t = cos(iTime * 0.2) * 0.5 + 0.5;
  float col = t * col1 + (t - 1.0) * col2;

  float c1 = map(col, -1.0, 1.0, 0.0, 1.0);

  gl_FragColor = vec4(palette(c1), 1.0);
}
`;

    // ================== P5 SKETCH ==================
    let theShader;

    let colA, colB, colC, colD;

    function setup() {
      createCanvas(windowWidth, windowHeight, WEBGL);
      noStroke();

      theShader = createShader(vert, frag);

      // ===== UI COLOR PICKERS =====
      colA = createColorPicker("#ff3366");
      colB = createColorPicker("#33ccff");
      colC = createColorPicker("#ffffff");
      colD = createColorPicker("#222222");

      colA.position(10, 10);
      colB.position(10, 40);
      colC.position(10, 70);
      colD.position(10, 100);
    }

    function colorToVec3(c) {
      return [red(c) / 255, green(c) / 255, blue(c) / 255];
    }

    function draw() {
      shader(theShader);

      // normalize mouse to -1 → 1 space
      let xMouse = (mouseX / width) * 2 - 1;
      let yMouse = (1.0 - mouseY / height) * 2 - 1;

      xMouse *= width / height;

      theShader.setUniform("iResolution", [width, height]);
      theShader.setUniform("iTime", millis() / 1000.0);
      theShader.setUniform("iMouse", [xMouse, yMouse]);

      // ===== SEND COLORS =====
      theShader.setUniform("uColorA", colorToVec3(colA.color()));
      theShader.setUniform("uColorB", colorToVec3(colB.color()));
      theShader.setUniform("uColorC", colorToVec3(colC.color()));
      theShader.setUniform("uColorD", colorToVec3(colD.color()));

      rect(-width / 2, -height / 2, width, height);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }

  </script>

</body>

</html>
